name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No cancel-in-progress: during a multi-agent wave every commit is a real
# correctness change we want independently verified, so let each run complete
# rather than cancelling on the next push. Concurrent hosted-runner jobs are
# fine; per-commit CI signal is worth the minutes for a conformance project.

env:
  # Pinned libaom oracle commit (see reference/BUILD_CONFIG.md). Bump the cache
  # key salt (-vN) when the pin or build config changes.
  LIBAOM_SHA: 03087864cf4bea6abb0d28f95cf7843511413d8f

jobs:
  test-linux:
    name: linux differential (x86-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install C-oracle build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm cmake ninja-build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Every crate links the C libaom oracle via aom-sys-ref, so the whole
      # workspace needs it built. Cache it keyed on the pinned commit — after
      # the first run reference/build.sh no-ops and this restores in seconds.
      - name: Cache libaom reference oracle
        uses: actions/cache@v6
        with:
          path: reference/libaom
          key: libaom-${{ runner.os }}-${{ env.LIBAOM_SHA }}-v1

      - name: Build C libaom reference oracle
        run: bash reference/build.sh

      # Deterministically provision the Gate-1 conformance corpus. The workspace
      # conformance test (conformance_corpus.rs) fail-loud-asserts when
      # conformance/data/ is empty — correct (no silent skip), but non-hermetic
      # unless the corpus is actually provisioned. Fetch libaom's own sha1-pinned
      # intra-scope vectors (name+sha1 from reference/libaom's test-data.sha1
      # manifest; bytes from storage.googleapis.com/aom-test-data). Cached, keyed
      # on the manifest, so later runs restore in seconds and re-verify without
      # re-downloading. Must run AFTER the oracle step (which provides the
      # manifest — reference/libaom is gitignored/cloned by build.sh).
      - name: Cache conformance corpus
        uses: actions/cache@v6
        with:
          path: conformance/data
          key: conformance-intra-${{ runner.os }}-${{ hashFiles('reference/libaom/test/test-data.sha1') }}-v1
      - name: Provision conformance corpus (intra scope)
        run: python3 xtask/conformance.py --fetch --scope intra

      # archmage/magetypes (SIMD dispatch) come from crates.io ("0.9.27") —
      # the former absolute-path dep + CI clone workaround was migrated per
      # its TODO (Gate-3 SIMD work needs ONE archmage instance workspace-wide
      # so the AOM_FORCE_SCALAR token pin reaches every kernel crate).

      - name: Test workspace (differential vs C oracle)
        run: cargo test --workspace --no-fail-fast

  # SCALAR-PIN mode (Gate-3 parity rule 3): AOM_FORCE_SCALAR disables every
  # archmage SIMD token process-wide (crates/aom-dispatch), so every kernel
  # dispatch falls through to `_scalar` = the transcribed C port, verbatim.
  # The FULL suite passing here proves SIMD work left the scalar path
  # untouched. Locally: `just test-scalar`.
  test-linux-scalar-pinned:
    name: linux differential (forced-scalar pin)
    runs-on: ubuntu-latest
    env:
      AOM_FORCE_SCALAR: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Install C-oracle build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nasm cmake ninja-build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache libaom reference oracle
        uses: actions/cache@v6
        with:
          path: reference/libaom
          key: libaom-${{ runner.os }}-${{ env.LIBAOM_SHA }}-v1
      - name: Build C libaom reference oracle
        run: bash reference/build.sh
      - name: Cache conformance corpus
        uses: actions/cache@v6
        with:
          path: conformance/data
          key: conformance-intra-${{ runner.os }}-${{ hashFiles('reference/libaom/test/test-data.sha1') }}-v1
      - name: Provision conformance corpus (intra scope)
        run: python3 xtask/conformance.py --fetch --scope intra
      - name: Test workspace under the scalar pin
        run: cargo test --workspace --no-fail-fast

# TODO (next CI chunk): the mandated platform matrix — windows-11-arm,
# macos-15-intel, and i686-unknown-linux-gnu (via cross). Each is gated on
# building the libaom oracle for that target (32-bit nasm/cmake for i686,
# MSVC + AV1 assembly for windows-arm), which is a dedicated sub-project since
# all 13 crates depend on aom-sys-ref. This linux job is the first slice.
